<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Pomodoro Timer</title>
</head>
<body style="text-align:center; font-family:sans-serif;">

  <h1>🍅 Pomodoro Timer</h1>
  <h2 id="time">25:00</h2>

  <button onclick="startTimer()">Start</button>
  <button onclick="resetTimer()">Reset</button>

  <script>
    let time = 1500;
    let timer;

    function updateDisplay() {
      let minutes = Math.floor(time / 60);
      let seconds = time % 60;
      document.getElementById("time").textContent =
        minutes + ":" + (seconds < 10 ? "0" : "") + seconds;
    }

    function startTimer() {
      if (timer) return;
      timer = setInterval(() => {
        if (time > 0) {
          time--;
          updateDisplay();
        } else {
          clearInterval(timer);
          alert("انتهى الوقت!");
        }
      }, 1000);
    }

    function resetTimer() {
      clearInterval(timer);
      timer = null;
      time = 1500;
      updateDisplay();
    }

    updateDisplay();
  </script>

</body>
</html>
